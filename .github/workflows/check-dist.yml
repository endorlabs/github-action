# Based on workflow: https://github.com/actions/typescript-action/blob/44c6b5a5393e7ec172e7dd1d900071c6b512b846/.github/workflows/check-dist.yml
# - Modified to use `yarn` instead of `npm`
#
# This workflow helps ensure the integrity of the code the action runs, by
# checking for the expected build output under `dist/` from the current
# source files.

name: Check dist/

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-dist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.x

      - name: Setup Yarn
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Rebuild the dist/ directory
        run: |
          yarn run build
          yarn run package

      - name: Compare the expected and actual dist/ directories
        run: |
          if [ "$(git diff --ignore-space-at-eol dist/ | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes after a rebuild.  See changed files below:"
            git diff --stat dist/
            exit 1
          fi
        id: diff

      # If index.js was different than expected, upload the expected version as an artifact
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ failure() && steps.diff.conclusion == 'failure' }}
        with:
          name: dist
          path: dist/
